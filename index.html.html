<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>药品审核计算器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  :root {
    --bg:#f0f4f8;--card:#fff;--primary:#2563eb;--text:#1e293b;--text-sub:#64748b;
    --border:#e2e8f0;--danger:#dc2626;--danger-bg:#fef2f2;--danger-bd:#fca5a5;
    --ok-bg:#f0fdf4;--ok-bd:#86efac;--input-bg:#f8fafc;
    --radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:16px;padding-bottom:48px}
  header{text-align:center;padding:20px 0 16px}
  header h1{font-size:18px;font-weight:700;color:var(--primary)}
  header p{font-size:12px;color:var(--text-sub);margin-top:4px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
  .card-title{font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .card-title::before{content:'';display:block;width:3px;height:13px;background:var(--primary);border-radius:2px}
  .days-row{display:flex;align-items:center;gap:10px}
  .days-row label{font-size:14px;white-space:nowrap}
  .days-row input{width:80px;text-align:center;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;-webkit-appearance:none}
  .days-row input:focus{outline:none;border-color:var(--primary)}
  .days-formula{font-size:13px;color:var(--text-sub);margin-top:8px}
  .days-formula span{color:var(--primary);font-weight:700}
  .drug-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .drug-block{background:var(--input-bg);border-radius:10px;padding:12px;border:1.5px solid var(--border);transition:border-color .2s}
  .drug-block:focus-within{border-color:var(--primary)}
  .drug-name{font-size:13px;font-weight:700;color:var(--primary);text-align:center;margin-bottom:10px}
  .opt{font-size:10px;color:var(--text-sub);font-weight:400;margin-left:3px}
  .field{margin-bottom:8px}
  .field label{font-size:11px;color:var(--text-sub);display:block;margin-bottom:3px}
  .field input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);transition:border-color .2s;-webkit-appearance:none}
  .field input:focus{outline:none;border-color:var(--primary)}
  .field input::placeholder{color:#cbd5e1}
  .calc-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:1px;margin-top:4px;transition:background .2s,transform .1s}
  .calc-btn:active{background:#1d4ed8;transform:scale(.98)}
  .error-msg{display:none;background:#fef2f2;border:1px solid #fca5a5;color:var(--danger);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:8px}

  /* 结果区 */
  .result-wrap{display:none;animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .verdict-ok{
    background:var(--ok-bg);border:2px solid var(--ok-bd);
    border-radius:var(--radius);padding:16px;
    text-align:center;font-size:17px;font-weight:700;color:var(--text);
    margin-bottom:0;
  }

  .verdict-over{
    background:var(--danger-bg);border:2px solid var(--danger-bd);
    border-radius:var(--radius);padding:14px 16px;
    font-size:16px;font-weight:700;color:var(--danger);
    text-align:center;
    margin-bottom:10px;
  }

  .stat-box{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px 16px;margin-bottom:10px;
  }
  .stat-box-label{
    font-size:11px;font-weight:700;color:var(--text-sub);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;
  }
  .stat-box-label.red{
    font-size:15px;color:var(--danger);text-transform:none;letter-spacing:0;font-weight:700;
  }
  .drug-row{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:5px 0;border-bottom:1px solid var(--border);
  }
  .drug-row:last-of-type{border-bottom:none}
  .drug-row-name{font-size:13px;color:var(--text-sub)}
  .drug-row-name.red{color:var(--danger)}
  .drug-row-val{font-size:15px;font-weight:700;color:var(--text)}
  .drug-row-val.red{color:var(--danger)}
  .drug-row-sub{font-size:12px;color:var(--text);font-weight:400;margin-left:4px}
  .drug-row-sub.red{color:var(--danger)}

  .maintain-row{
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);
    font-size:13px;color:var(--text);
  }
  .maintain-row b{font-weight:700}

  .reset-btn{width:100%;padding:12px;background:transparent;color:var(--text-sub);border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;cursor:pointer;margin-top:4px}
</style>
</head>
<body>

<header>
  <h1>药品审核计算器</h1>
  <p>医保参保人员用药合规审核工具</p>
</header>

<div class="card">
  <div class="card-title">审核天数设置</div>
  <div class="days-row">
    <label>审核天数 =</label>
    <input type="number" id="days_x" placeholder="填入天数" min="0" inputmode="numeric">
    <label>天</label>
  </div>
  <div class="days-formula">审核总天数 = 填入天数 + 30 = <span id="total_days_preview">—</span> 天</div>
</div>

<div class="card">
  <div class="card-title">药品 A（必填）、B（选填）</div>
  <div class="drug-grid">
    <div class="drug-block">
      <div class="drug-name">药品 A</div>
      <div class="field"><label>每日剂量（片）</label><input type="number" id="daily_a" placeholder="如 3" min="0" inputmode="decimal"></div>
      <div class="field"><label>每盒片数</label><input type="number" id="perbox_a" placeholder="如 60" min="1" inputmode="decimal"></div>
      <div class="field"><label>实际配药（盒）</label><input type="number" id="boxes_a" placeholder="如 50" min="0" inputmode="decimal"></div>
    </div>
    <div class="drug-block">
      <div class="drug-name">药品 B<span class="opt">选填</span></div>
      <div class="field"><label>每日剂量（片）</label><input type="number" id="daily_b" placeholder="选填" min="0" inputmode="decimal"></div>
      <div class="field"><label>每盒片数</label><input type="number" id="perbox_b" placeholder="选填" min="1" inputmode="decimal"></div>
      <div class="field"><label>实际配药（盒）</label><input type="number" id="boxes_b" placeholder="选填" min="0" inputmode="decimal"></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">药品 C、D（均选填）</div>
  <div class="drug-grid">
    <div class="drug-block">
      <div class="drug-name">药品 C<span class="opt">选填</span></div>
      <div class="field"><label>每日剂量（片）</label><input type="number" id="daily_c" placeholder="选填" min="0" inputmode="decimal"></div>
      <div class="field"><label>每盒片数</label><input type="number" id="perbox_c" placeholder="选填" min="1" inputmode="decimal"></div>
      <div class="field"><label>实际配药（盒）</label><input type="number" id="boxes_c" placeholder="选填" min="0" inputmode="decimal"></div>
    </div>
    <div class="drug-block">
      <div class="drug-name">药品 D<span class="opt">选填</span></div>
      <div class="field"><label>每日剂量（片）</label><input type="number" id="daily_d" placeholder="选填" min="0" inputmode="decimal"></div>
      <div class="field"><label>每盒片数</label><input type="number" id="perbox_d" placeholder="选填" min="1" inputmode="decimal"></div>
      <div class="field"><label>实际配药（盒）</label><input type="number" id="boxes_d" placeholder="选填" min="0" inputmode="decimal"></div>
    </div>
  </div>
</div>

<div class="error-msg" id="error_msg">⚠️ 请填写审核天数及药品 A 的完整资料</div>
<button class="calc-btn" onclick="calculate()">开始审核</button>

<div class="result-wrap" id="result_wrap">

  <!-- 合规 -->
  <div class="verdict-ok" id="verdict_ok" style="display:none">
    ✅ 未超量
  </div>

  <!-- 超量 -->
  <div id="verdict_over_wrap" style="display:none">
    <div class="verdict-over">⚠️ 超量</div>

    <!-- 格1：理论最大需求 + 可维持 -->
    <div class="stat-box">
      <div class="stat-box-label">理论最大需求</div>
      <div id="theory_rows"></div>
      <div class="maintain-row" id="maintain_row"></div>
    </div>

    <!-- 格2：超出量 -->
    <div class="stat-box">
      <div class="stat-box-label red">超出量</div>
      <div id="excess_rows"></div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetAll()">重置重新计算</button>
</div>

<script>
document.getElementById('days_x').addEventListener('input', function() {
  const x = parseFloat(this.value);
  document.getElementById('total_days_preview').textContent = (!isNaN(x) && x >= 0) ? (x + 30) : '—';
});

function v(id) {
  const n = parseFloat(document.getElementById(id).value);
  return isNaN(n) ? null : n;
}

function calculate() {
  document.getElementById('error_msg').style.display = 'none';
  const x = v('days_x');
  if (x === null || x < 0) { document.getElementById('error_msg').style.display = 'block'; return; }
  const days = x + 30;

  const defs = [
    { lbl: 'A', daily: v('daily_a'), perbox: v('perbox_a'), boxes: v('boxes_a') },
    { lbl: 'B', daily: v('daily_b'), perbox: v('perbox_b'), boxes: v('boxes_b') },
    { lbl: 'C', daily: v('daily_c'), perbox: v('perbox_c'), boxes: v('boxes_c') },
    { lbl: 'D', daily: v('daily_d'), perbox: v('perbox_d'), boxes: v('boxes_d') },
  ];

  if (defs[0].daily === null || defs[0].perbox === null || defs[0].boxes === null) {
    document.getElementById('error_msg').style.display = 'block'; return;
  }

  const valid = defs.filter(d => d.daily !== null && d.perbox !== null && d.boxes !== null && d.perbox > 0);
  const actual  = valid.reduce((s, d) => s + d.boxes * d.perbox, 0);
  const maxD    = Math.max(...valid.map(d => d.daily));
  const theory  = maxD * days;
  const excess  = actual - theory;
  const extraD  = (maxD > 0 && excess > 0) ? excess / maxD : 0;
  const extraM  = extraD / 30;

  const wrap = document.getElementById('result_wrap');
  wrap.style.display = 'block';

  if (excess <= 0) {
    document.getElementById('verdict_ok').style.display = 'block';
    document.getElementById('verdict_over_wrap').style.display = 'none';
  } else {
    document.getElementById('verdict_ok').style.display = 'none';
    document.getElementById('verdict_over_wrap').style.display = 'block';

    // 格1：理论最大需求（向上取整）
    const theoryRows = valid.map(d => {
      const exact = theory / d.perbox;
      const ceil  = Math.ceil(exact);
      const tag   = Number.isInteger(exact) ? '' : `（${exact.toFixed(1)}≈${ceil}）`;
      return `<div class="drug-row">
        <span class="drug-row-name">药品 ${d.lbl}</span>
        <span class="drug-row-val">${ceil} 盒<span class="drug-row-sub">${tag}</span></span>
      </div>`;
    }).join('');
    document.getElementById('theory_rows').innerHTML = theoryRows;

    // 可维持天数
    document.getElementById('maintain_row').innerHTML =
      `超出可额外维持 <b>${extraD.toFixed(1)} 天</b>（约 <b>${extraM.toFixed(1)} 个月</b>）`;

    // 格2：超出量（向下取整）
    const excessPills = excess;
    const excessRows = valid.map(d => {
      const exact = excessPills / d.perbox;
      const floor = Math.floor(exact);
      const tag   = Number.isInteger(exact)
        ? `（${Math.round(excessPills)} 片）`
        : `（${Math.round(excessPills)} 片，${exact.toFixed(1)}≈${floor}）`;
      return `<div class="drug-row">
        <span class="drug-row-name red">药品 ${d.lbl}</span>
        <span class="drug-row-val red">${floor} 盒<span class="drug-row-sub red">${tag}</span></span>
      </div>`;
    }).join('');
    document.getElementById('excess_rows').innerHTML = excessRows;
  }

  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetAll() {
  ['days_x','daily_a','perbox_a','boxes_a','daily_b','perbox_b','boxes_b',
   'daily_c','perbox_c','boxes_c','daily_d','perbox_d','boxes_d'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('total_days_preview').textContent = '—';
  document.getElementById('result_wrap').style.display = 'none';
  document.getElementById('verdict_ok').style.display = 'none';
  document.getElementById('verdict_over_wrap').style.display = 'none';
  document.getElementById('error_msg').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
